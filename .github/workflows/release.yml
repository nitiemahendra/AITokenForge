name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  validate:
    name: Validate Tests Pass
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install and test
        env:
          LLM_ADAPTER: mock
          LOG_LEVEL: WARNING
        run: |
          pip install -r backend/requirements-dev.txt
          pytest backend/tests -v --tb=short

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create source archive
        run: |
          git archive --format=zip --prefix=tokenforge-${{ steps.version.outputs.VERSION }}/ \
            HEAD backend/ frontend/src frontend/package.json frontend/vite.config.ts \
            frontend/tsconfig.json frontend/tailwind.config.js frontend/index.html \
            frontend/postcss.config.js mcp_server/ installer/ launcher/ scripts/ \
            docker/ docs/ examples/ benchmarks/ configs/ \
            README.md LICENSE CONTRIBUTING.md SECURITY.md CODE_OF_CONDUCT.md \
            DISCLAIMER.md CHANGELOG.md .env.example pyproject.toml Makefile \
            docker-compose.yml \
            -o tokenforge-${{ steps.version.outputs.VERSION }}.zip

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION_TAG=${{ steps.version.outputs.VERSION }}
          VERSION_NUM=${VERSION_TAG#v}
          awk "/^## \[$VERSION_NUM\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md > release_notes.md
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: TokenForge ${{ steps.version.outputs.VERSION }}
          body_path: release_notes.md
          files: |
            tokenforge-${{ steps.version.outputs.VERSION }}.zip
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-beta') || contains(steps.version.outputs.VERSION, '-rc') }}
